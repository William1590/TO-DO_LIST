<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Our List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..600&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8EC;
    --card:#FFFFFF;
    --ink:#b45016;
    --ink-soft:#c5c1bf;
    --honey:#F2A93B;
    --honey-deep:#D6862A;
    --sage:#6B8F71;
    --line:#EFE2C8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--cream);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(242,169,59,0.08) 0%, transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(107,143,113,0.08) 0%, transparent 40%);
    font-family:'Figtree', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:32px 16px 80px;
  }
  
    body {
  background: url('./BEE222.jpg') center center/cover no-repeat;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  position: relative;
}
  .wrap{
    width:100%;
    max-width:460px;
  }
  header{
    text-align:center;
    margin-bottom:28px;
  }
  .hex-icon{
    width:34px;
    height:30px;
    margin:0 auto 10px;
    background:linear-gradient(135deg, var(--honey), var(--honey-deep));
    clip-path:polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    box-shadow:0 3px 8px rgba(214,134,42,0.35);
  }
  h1{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:2.1rem;
    margin:0 0 4px;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-size:0.85rem;
    color:var(--ink-soft);
    margin:0;
  }
  .card{
    background:var(--card);
    border-radius:18px;
    padding:20px;
    box-shadow:0 10px 30px rgba(74,46,30,0.07);
  }
  form{
    display:flex;
    gap:8px;
    margin-bottom:18px;
  }
  input[type=text]{
    flex:1;
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
    font-family:inherit;
    font-size:0.95rem;
    color:var(--ink);
    background:#FFFDF8;
    outline:none;
    transition:border-color .15s;
  }
  input[type=text]:focus{
    border-color:var(--honey);
  }
  button.add{
    border:none;
    border-radius:12px;
    padding:0 18px;
    background:linear-gradient(135deg, var(--honey), var(--honey-deep));
    color:#fff;
    font-family:inherit;
    font-weight:700;
    font-size:0.95rem;
    cursor:pointer;
    transition:transform .1s, box-shadow .15s;
    box-shadow:0 4px 10px rgba(214,134,42,0.3);
  }
  button.add:hover{ transform:translateY(-1px); }
  button.add:active{ transform:translateY(0); }
  button.add:disabled{ opacity:0.5; cursor:default; }

  .section-label{
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    margin:18px 0 8px 2px;
    font-weight:700;
  }
  .section-label.first{ margin-top:0; }

  ul{
    list-style:none;
    margin:0;
    padding:0;
  }
  li{
    display:flex;
    align-items:flex-start;
    gap:11px;
    padding:9px 2px;
    border-bottom:1px solid var(--line);
  }
  li:last-child{ border-bottom:none; }

  .hexbox{
    flex:0 0 22px;
    width:22px;
    height:20px;
    margin-top:1px;
    clip-path:polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    background:#FFFDF8;
    border:none;
    cursor:pointer;
    padding:0;
    position:relative;
    transition:background .15s;
    flex-shrink:0;
  }
  .hexbox::after{
    content:'';
    position:absolute;
    inset:0;
    clip-path:polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    background:linear-gradient(135deg, var(--honey), var(--honey-deep));
    opacity:0;
    transition:opacity .15s;
  }
  .hexbox.done::after{ opacity:1; }
  .hexbox.done.is-done-section::after{ background:linear-gradient(135deg, var(--sage), #557A5B); }
  .hexbox svg{
    position:absolute;
    inset:0;
    margin:auto;
    width:12px;
    height:12px;
    top:4px;
    left:5px;
    opacity:0;
    transition:opacity .15s;
  }
  .hexbox.done svg{ opacity:1; }

  .item-text{
    flex:1;
    font-size:0.96rem;
    line-height:1.4;
    padding-top:1px;
    word-break:break-word;
  }
  .item-text.done{
    text-decoration:line-through;
    color:var(--ink-soft);
    opacity:0.75;
  }

  .del{
    border:none;
    background:none;
    color:var(--ink-soft);
    font-size:1rem;
    cursor:pointer;
    padding:0 4px;
    line-height:1;
    opacity:0.5;
    transition:opacity .15s, color .15s;
    flex-shrink:0;
  }
  .del:hover{ opacity:1; color:#B5483A; }

  .empty{
    text-align:center;
    padding:28px 10px;
    color:var(--ink-soft);
    font-size:0.92rem;
  }

  .sync{
    text-align:center;
    font-size:0.72rem;
    color:var(--ink-soft);
    margin-top:14px;
    opacity:0.7;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hex-icon"></div>
    <h1>Our To-Do List</h1>
    <p class="subtitle">whatever we don't want to forget, but looking forward to</p>
  </header>

  <div class="card">
    <form id="addForm">
      <input type="text" id="newItem" placeholder="Add something…" autocomplete="off" maxlength="200" />
      <button type="submit" class="add" id="addBtn">Add</button>
    </form>

    <div id="listArea"></div>

    <p class="sync" id="syncNote">syncing…</p>
  </div>
</div>

<script>
const STORAGE_KEY = 'shared-todo-items';
let items = [];
let loaded = false;

const listArea = document.getElementById('listArea');
const form = document.getElementById('addForm');
const input = document.getElementById('newItem');
const addBtn = document.getElementById('addBtn');
const syncNote = document.getElementById('syncNote');

function checkIcon(){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
}

function render(){
  const pending = items.filter(i => !i.done);
  const done = items.filter(i => i.done);

  if(items.length === 0){
    listArea.innerHTML = '<div class="empty">Nothing here yet — add the first thing below.</div>';
    return;
  }

  let html = '';

  if(pending.length){
    html += '<ul>' + pending.map(renderItem).join('') + '</ul>';
  }

  if(done.length){
    html += '<div class="section-label' + (pending.length ? '' : ' first') + '">Done</div>';
    html += '<ul>' + done.map(renderItem).join('') + '</ul>';
  }

  listArea.innerHTML = html;

  listArea.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => toggleItem(el.getAttribute('data-toggle')));
  });
  listArea.querySelectorAll('[data-delete]').forEach(el => {
    el.addEventListener('click', () => deleteItem(el.getAttribute('data-delete')));
  });
}

function renderItem(item){
  const doneClass = item.done ? 'done' : '';
  const sectionClass = item.done ? 'is-done-section' : '';
  return `<li>
    <button class="hexbox ${doneClass} ${sectionClass}" data-toggle="${item.id}">${checkIcon()}</button>
    <span class="item-text ${doneClass}">${escapeHtml(item.text)}</span>
    <button class="del" data-delete="${item.id}" aria-label="Delete">✕</button>
  </li>`;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.innerText = str;
  return d.innerHTML;
}

async function loadItems(silent){
  try{
    const result = await window.storage.get(STORAGE_KEY, true);
    const data = result ? JSON.parse(result.value) : [];
    items = Array.isArray(data) ? data : [];
    loaded = true;
    render();
    if(!silent) syncNote.textContent = 'synced';
  }catch(err){
    items = [];
    loaded = true;
    render();
  }
}

async function saveItems(){
  try{
    const result = await window.storage.set(STORAGE_KEY, JSON.stringify(items), true);
    if(!result){
      syncNote.textContent = "couldn't save — check connection";
    }else{
      syncNote.textContent = 'synced';
    }
  }catch(err){
    syncNote.textContent = "couldn't save — check connection";
  }
}

async function addItem(text){
  const newItem = { id: Date.now().toString(36) + Math.random().toString(36).slice(2,6), text, done:false };
  items.push(newItem);
  render();
  await saveItems();
}

async function toggleItem(id){
  items = items.map(i => i.id === id ? { ...i, done: !i.done } : i);
  render();
  await saveItems();
}

async function deleteItem(id){
  items = items.filter(i => i.id !== id);
  render();
  await saveItems();
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  addBtn.disabled = true;
  await addItem(text);
  addBtn.disabled = false;
  input.focus();
});

// Initial load
syncNote.textContent = 'syncing…';
loadItems(false);

// Light polling so both people stay roughly in sync
setInterval(() => { if(loaded) loadItems(true); }, 4000);

// Refresh when the tab regains focus
window.addEventListener('focus', () => { if(loaded) loadItems(true); });
</script>
</body>
</html>
